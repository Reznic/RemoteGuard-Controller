# Common configurations for all boards
CONFIG_NEWLIB_LIBC=y
# General
CONFIG_HW_ID_LIBRARY=y
CONFIG_ASSERT=y
CONFIG_HEAP_MEM_POOL_SIZE=2048

CONFIG_PWM=y
CONFIG_GPIO=y

# SPI for camera
CONFIG_SPI=y

# Logging
CONFIG_LOG=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_NATIVE=y
CONFIG_NET_CONNECTION_MANAGER=y

# ZBus
CONFIG_ZBUS=y

# Zephyr state framework
CONFIG_SMF=y

# MQTT
CONFIG_MQTT_HELPER=n
CONFIG_MQTT_CLIENT=y
CONFIG_MQTT_CLEAN_SESSION=y
CONFIG_MQTT_SAMPLE_TRANSPORT_BROKER_HOSTNAME="broker.hivemq.com"
CONFIG_MQTT_KEEPALIVE=60
# Last Will: broker publishes offline_unexpected on <device_id>/lwt if connection drops uncleanly
CONFIG_MQTT_CLIENT_LAST_WILL=y
CONFIG_MQTT_CLIENT_LAST_WILL_TOPIC="lwt"
CONFIG_MQTT_CLIENT_LAST_WILL_MESSAGE="offline_unexpected"

CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=y
CONFIG_LTE_NETWORK_MODE_NBIOT=n

CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

CONFIG_MQTT_SAMPLE_CAMERA=n
CONFIG_ESP32CAM_DRIVER=n
CONFIG_MQTT_SAMPLE_GNSS=y

CONFIG_CBPRINTF_PACKAGE_LONGDOUBLE=y