#
# Overlay for testing, running on native_sim - linux host
#
# Build the app for native_sim (32-bit x86 host).
# On Linux: gcc-multilib libc6-dev-i386, net-tools; host NAT for WAN (see run_integration_tests.sh).
#
# Gcov (host gcc): integration tests always collect coverage; reports are filtered to app/src (see integration_coverage_report.py).
CONFIG_COVERAGE=y

# Modem / nRF91-specific
CONFIG_NRF_MODEM_LIB=n
CONFIG_NRF_MODEM_LIB_NET_IF=n
CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=n
CONFIG_AT_HOST_LIBRARY=n
CONFIG_DK_LIBRARY=n

# GNSS: real gnss.c + tests/mocks/gnss_modem_mock.c (synthetic PVT on native_sim)
CONFIG_MQTT_SAMPLE_GNSS=y

# BSD sockets on host instead of modem offload
CONFIG_NET_SOCKETS_OFFLOAD=n

# Ethernet on POSIX (native_sim): creates a TAP device (zeth). The zephyr binary
# needs CAP_NET_ADMIN+CAP_NET_RAW (see scripts/run_integration_tests.sh setcap) or
# the driver logs "Cannot create zeth" and DNS/MQTT fail (getaddrinfo ~ -101).
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NATIVE_POSIX=y
CONFIG_ETH_NATIVE_POSIX_RANDOM_MAC=y

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_MAX_CONTEXTS=10

# DNS + static addressing for conn_mgr (see Zephyr native_sim networking docs).
# Public DNS; run_integration_tests.sh enables IPv4 forwarding + NAT from zeth to the default route.
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.2.2"

# Helps MQTT/TCP connect behavior on native_sim (matches nrf/samples/net/mqtt/boards/native_sim.conf)
CONFIG_NET_CONTEXT_SNDTIMEO=y

# MQTT + DNS need more heap than the default 2 KiB app pool on native_sim
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Deterministic integration-test client ID (must match tests/integration constants)
CONFIG_MQTT_SAMPLE_TRANSPORT_CLIENT_ID="remoteguard-test-001"

# Do not use IMEI path for client ID on native_sim
CONFIG_HW_ID_LIBRARY_SOURCE_IMEI=n

# Plain MQTT (port 1883); TLS off unless prj enables it
CONFIG_MQTT_LIB_TLS=n

# Shorter keepalive so broker publishes LWT soon after abrupt native_sim exit (integration tests)
CONFIG_MQTT_KEEPALIVE=10

# Default transport reconnect delay is 60s; integration tests wait ~45s for post-partition "online"
CONFIG_MQTT_SAMPLE_TRANSPORT_RECONNECTION_TIMEOUT_SECONDS=3
