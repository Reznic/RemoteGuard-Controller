name: Twister Apps & Samples

on:
  push:
    paths:
      - 'app/**'
      - 'boards/**'
      - 'zephyr/**'
      - 'CMakeLists.txt'
      - 'Kconfig'
      - 'VERSION'
      - 'west.yml'
  pull_request:
  # schedule:
    # Run at 03:00 UTC on every Sunday
    # - cron: "0 3 * * 0"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: nrf9151-connectkit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: nrf9151-connectkit
          toolchains: arm-zephyr-eabi

      - name: Twister Application
        working-directory: nrf9151-connectkit
        shell: bash
        run: |
          west twister -T app -v --inline-logs --integration

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: connectkit-firmware
          path: nrf9151-connectkit/twister-out/**/*.hex