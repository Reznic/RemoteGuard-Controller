name: Twister Apps & Samples

on:
  push:
    paths:
      - 'app/**'
      - 'boards/**'
      - 'zephyr/**'
      - 'tests/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - 'Kconfig'
      - 'VERSION'
      - 'west.yml'
  pull_request:
  # schedule:
    # Run at 03:00 UTC on every Sunday
    # - cron: "0 3 * * 0"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: nrf9151-connectkit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: nrf9151-connectkit
          toolchains: arm-zephyr-eabi

      # 32-bit native_sim (-m32) needs multilib + 32-bit libc headers for the NSI runner link.
      - name: Host packages for native_sim (32-bit x86)
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib libc6-dev-i386

      - name: Build Twister Application
        working-directory: nrf9151-connectkit
        shell: bash
        run: |
          west twister -T app -v --inline-logs --integration

      - name: Unit tests
        working-directory: nrf9151-connectkit
        shell: bash
        run: |
          west twister -T tests/ztest/topic_format -v --inline-logs -p native_sim

      - name: Integration tests
        working-directory: nrf9151-connectkit
        shell: bash
        run: ./scripts/run_integration_tests.sh -v

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: connectkit-firmware
          path: nrf9151-connectkit/twister-out/**/*.hex