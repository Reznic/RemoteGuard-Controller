[pytest]
markers =
    mqtt: MQTT broker / transport integration tests
    e2e: End-to-end tests (native_sim DUT + broker)
    gnss: GNSS-related integration tests (reserved)
    hil: tests that require real hardware
    expect_errors_in_log: skip per-test <err> scan in native_sim log (expected errors)
filterwarnings =
    ignore::DeprecationWarning
